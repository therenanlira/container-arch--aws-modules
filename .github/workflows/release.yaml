name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    name: Validate Modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [network, ecs_cluster, ecs_service, ecr_repository]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.13"
          # The wrapper does not propagate terraform's real exit code to the
          # shell, which breaks -detailed-exitcode checks.
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so every tag is available for the version bump.
          fetch-depth: 0

      - name: Compute next version
        id: version
        # Patch bump by default. Put "#minor" or "#major" anywhere in the merge
        # commit message to bump that part instead.
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST=${LATEST:-v0.0.0}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"

          COMMIT_MSG=$(git log -1 --pretty=%B)
          if grep -q "#major" <<< "$COMMIT_MSG"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif grep -q "#minor" <<< "$COMMIT_MSG"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "Latest: $LATEST -> New: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "major_tag=v$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor_tag=v$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.new_version }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.version.outputs.new_version }}" \
            --generate-notes

      - name: Update floating major and minor tags
        # Keep the moving tags (e.g. v1 and v1.4) pointing at the newest
        # release, so consumers pinned to ?ref=v1 follow non-breaking updates
        # and ?ref=v1.4 follows patch updates only.
        run: |
          git tag -f "${{ steps.version.outputs.major_tag }}" "$GITHUB_SHA"
          git tag -f "${{ steps.version.outputs.minor_tag }}" "$GITHUB_SHA"
          git push origin "${{ steps.version.outputs.major_tag }}" "${{ steps.version.outputs.minor_tag }}" --force
